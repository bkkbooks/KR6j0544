body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯爾時世尊在迦毗羅城尼俱律那僧伽藍所與諸比丘并諸菩薩無數衆會前後圍繞而為説法爾時阿難獨居靜處念所受法即於其夜三更已後見一餓鬼名曰焰口其形醜陋身體枯瘦口中火然咽如針鋒頭髮蓬亂爪牙長利甚可怖畏住阿難前白阿難言却後三日汝命將盡即便生於餓鬼之中是時阿難聞此語已心生惶怖問餓鬼言若我死後生餓鬼者行何方便得免斯苦爾時餓鬼白阿難言汝於明日若能布施百千那由他恆河沙數餓鬼并百千婆羅門仙等以摩伽陀國所用之斛各施一斛飲食并及為我供養三寶汝得增壽令我離於餓鬼之苦得生天上阿難見此焰口餓鬼身形羸瘦枯燋極醜口中火然咽如針鋒頭髮蓬亂毛爪長利又聞如是不順之語甚大驚怖身毛皆竪即從座起疾至佛所五體投地頂禮佛足身體戰栗而白佛言願救我苦所以者何我住靜處念所授法見焰口餓鬼而語我言汝過三日必當命盡生餓鬼中我即問言云何令我得免斯苦餓鬼答言汝今若能施於百千那由他恆河沙數餓鬼及百千婆羅門仙等種種飲食汝得增壽世尊我今云何能辦若干餓鬼仙人等食爾時世尊告阿難言汝今勿怖我有方便令汝能施若干百千恆河沙餓鬼及諸婆羅門仙等種種飲食勿生憂惱佛告阿難有陀羅尼名曰無量威德自在光明殊勝妙力若有誦此陀羅尼者即能充足俱胝那由他百千恆河沙數餓鬼及婆羅門仙等上妙飲食如是等衆乃至一一皆得摩伽陀國所用之斛七七斛食阿難我於前世作婆羅門於觀世音菩薩所及世間自在威德如來所受此陀羅尼故能散施與無量餓鬼及諸仙等種種飲食令諸餓鬼解脫苦身得生天上阿難汝今受持福德壽命皆得增長爾時世尊即為阿難説陀羅尼曰那謨薩嚩怛他蘖多引嚩盧枳帝唵參婆囉參婆囉吽佛告阿難若有善男子善女人欲求長壽福德增榮速能滿足檀波羅蜜每於晨朝及一切時悉無障礙取一淨器盛以淨水置少飯及諸餅食等以右手加器誦前陀羅尼滿七遍然後稱四如來名號曩謨婆誐嚩帝鉢囉二合枳娘二合部引多囉怛曩二合怛他孽多也此云多寶如來由稱多寶如來名號加持故能破一切諸鬼多生已來慳吝惡業即得福德圓滿那謨婆誐嚩帝素嚕波引耶怛他誐哆野此云南無妙色身如來由稱妙色身如來名號加持故能破諸鬼醜陋惡形即得色相具足曩謨婆誐嚩帝尾鉢囉二合誐攞孽多怛囉二合也怛他孽多也此云廣博身如來由稱廣博身如來名號加持故能令諸鬼咽喉寬大所施之食恣意充飽曩謨婆誐嚩帝阿上婆去孕迦囉也怛他蘖多也此云離怖畏如來由稱離怖畏如來名號加持故能令諸鬼一切恐怖悉皆除滅離餓鬼趣佛告阿難若族姓善男子等既稱四如來名號加持已彈指七遍取於食器於淨地上展臂瀉之作此施已於其四方有百千那由他恆河沙數餓鬼前各有摩伽陀國七七斛食受此食已悉皆飽滿是諸鬼等悉捨鬼身生於天上阿難若有比丘比丘尼優婆塞優婆夷常以此密言及四如來名號加持食施鬼便能具足無量福德則同供養百千俱胝如來功德等無差別壽命延長增益色力善根具足一切非人夜叉羅剎諸惡鬼神不敢侵害又能成就無量福德壽命若欲施諸婆羅門仙等以淨飲食滿盛一器即以前密言加持二七遍投於淨流水中如是作已即為以天仙美妙之食供養百千俱胝恆河沙數婆羅門仙彼諸仙人得加持食故以密言威德各各成就根本所願諸善功德各各同時發誓願言願是食人令壽延長色力安樂又令其人心所見聞正解清淨具足成就梵天威德行梵天行又同供養百千恆河沙如來功德一切冤讎不能侵害若比丘比丘尼優婆塞優婆夷若欲供養佛法僧寶應以香華及淨飲食以前密言加持二十一遍奉獻三寶是善男子善女人則成以天肴膳上味奉獻供養滿十方界佛法僧寶亦為讚歎勸請隨喜功德恆為諸佛憶念稱讚諸天善神恆來擁護即為滿足檀波羅蜜阿難汝隨我語如法修行廣宣流布令諸衆生普得見聞獲無量福是名救焰口餓鬼及苦衆生陀羅尼經以是名字汝當奉持一切大衆及阿難等聞佛説已一心信受歡喜奉行
